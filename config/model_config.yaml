yolo:
  model_path: "data/models/yolov7_vehicle.pt"
  # Public torch-hub source used when no local weights are present.
  hub_repo: "WongKinYiu/yolov7"
  hub_model: "yolov7"
  confidence_threshold: 0.5
  iou_threshold: 0.45
  input_size: [640, 640]
  classes:
    - car
    - truck
    - bus
    - motorcycle
    - bicycle
    - pedestrian

feature_extractor:
  backbone: "resnet50"
  pretrained: true
  pooling: "avg"
  feature_dim: 2048
  motion:
    method: "farneback"
    history_frames: 5
  edges:
    method: "canny"
    low_threshold: 100
    high_threshold: 200

ensemble:
  models: ["random_forest", "xgboost", "neural_network"]
  weights: [0.3, 0.4, 0.3]
  random_forest:
    n_estimators: 300
    max_depth: 12
    min_samples_split: 4
    n_jobs: -1
  xgboost:
    n_estimators: 400
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
  neural_network:
    hidden_layer_sizes: [128, 64]
    activation: "relu"
    learning_rate_init: 0.001
    max_iter: 200

survival:
  model_path: "data/models/cox_model.pkl"
  duration_col: "time_to_event"
  event_col: "event"
  penalizer: 0.01
  time_horizons: [1, 3, 6, 12]  # months

inference:
  device: "auto"      # "cpu", "cuda", or "auto"
  batch_size: 32
  max_workers: 4
  warmup_iters: 3
