version: "3.9"

services:
  inference:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: driver-behavior-analytics:latest
    container_name: dba-inference
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ../data/models:/app/data/models:ro
      - ../config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
