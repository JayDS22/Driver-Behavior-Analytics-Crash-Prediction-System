apiVersion: v1
kind: Service
metadata:
  name: dba-inference
  labels:
    app: dba-inference
spec:
  selector:
    app: dba-inference
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dba-inference
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: dba-inference.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dba-inference
                port:
                  number: 80
